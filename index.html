<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snickers Cup Kampplangenerator</title>

  https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.jsscript>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #123c69, #1f7a8c);
      color: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 34px;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      background: #ffcc00;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ffd633;
      transform: scale(1.01);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .info {
      background: rgba(255,255,255,0.18);
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      line-height: 1.5;
    }

    .round {
      background: rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .round h2 {
      margin-top: 0;
      color: #ffcc00;
    }

    .matches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .match {
      background: #fff;
      color: #111;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.25);
    }

    .lane {
      font-weight: bold;
      color: #123c69;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .team {
      background: #f2f2f2;
      border-radius: 10px;
      padding: 10px;
    }

    .team-title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #1f7a8c;
    }

    ul {
      padding-left: 18px;
      margin: 0;
    }

    .warning {
      background: #ffdddd;
      color: #8a0000;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    .success {
      background: #ddffdd;
      color: #005c00;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      opacity: 0.9;
    }

    @media print {
      body {
        background: white;
        color: black;
      }

      .no-print {
        display: none;
      }

      .card, .round {
        background: white;
        color: black;
        box-shadow: none;
        border: 1px solid #ccc;
      }

      .match {
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Snickers Cup</h1>
    <div class="subtitle">Kampplangenerator med spillerrotation</div>

    <div class="card no-print">
      <label for="formatSelect">Vælg format</label>
      <select id="formatSelect">
        <option value="4x5">4 hold á 5 spillere</option>
        <option value="8x5">8 hold á 5 spillere</option>
      </select>

      <label for="excelFile">Upload spillerliste fra Excel</label>
      <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />

      <div class="info small">
        Excel-filen skal bare indeholde spillernavne i første kolonne.  
        Første række må gerne være overskrift.
      </div>

      <label for="playerInput">Spillerliste</label>
      <textarea id="playerInput" placeholder="Skriv ét spillernavn pr. linje"></textarea>

      <div class="button-row">
        <button onclick="generatePlan()">Lav kampplan</button>
        <button onclick="sharePlan()">Lav delbart link</button>
        <button onclick="copyShareLink()">Kopiér link</button>
        <button onclick="window.print()">Print kampplan</button>
        <button onclick="clearAll()">Ryd alt</button>
      </div>

      <div id="message"></div>
    </div>

    <div class="card">
      <h2>Opsætning</h2>
      <div id="setupInfo">Vælg format og indtast/upload spillere.</div>
    </div>

    <div id="schedule"></div>
  </div>

  <script>
    let latestShareLink = "";

    const defaultPlayers = [
      "Spiller 1", "Spiller 2", "Spiller 3", "Spiller 4", "Spiller 5",
      "Spiller 6", "Spiller 7", "Spiller 8", "Spiller 9", "Spiller 10",
      "Spiller 11", "Spiller 12", "Spiller 13", "Spiller 14", "Spiller 15",
      "Spiller 16", "Spiller 17", "Spiller 18", "Spiller 19", "Spiller 20",
      "Spiller 21", "Spiller 22", "Spiller 23", "Spiller 24", "Spiller 25",
      "Spiller 26", "Spiller 27", "Spiller 28", "Spiller 29", "Spiller 30",
      "Spiller 31", "Spiller 32", "Spiller 33", "Spiller 34", "Spiller 35",
      "Spiller 36", "Spiller 37", "Spiller 38", "Spiller 39", "Spiller 40"
    ];

    document.addEventListener("DOMContentLoaded", function () {
      loadFromUrl();
      loadSavedData();

      document.getElementById("excelFile").addEventListener("change", handleExcelUpload);
      document.getElementById("formatSelect").addEventListener("change", saveData);
      document.getElementById("playerInput").addEventListener("input", saveData);
    });

    function getSelectedFormat() {
      const value = document.getElementById("formatSelect").value;

      if (value === "8x5") {
        return {
          key: "8x5",
          teams: 8,
          teamSize: 5,
          playerCount: 40,
          rounds: 7,
          lanePairs: [
            [0, 1],
            [2, 3],
            [4, 5],
            [6, 7]
          ]
        };
      }

      return {
        key: "4x5",
        teams: 4,
        teamSize: 5,
        playerCount: 20,
        rounds: 3,
        lanePairs: [
          [0, 1],
          [2, 3]
        ]
      };
    }

    function getPlayers() {
      const raw = document.getElementById("playerInput").value.trim();

      if (!raw) {
        return [];
      }

      return raw
        .split("\n")
        .map(name => name.trim())
        .filter(name => name.length > 0);
    }

    function saveData() {
      const data = {
        format: document.getElementById("formatSelect").value,
        players: document.getElementById("playerInput").value
      };

      localStorage.setItem("snickerscupData", JSON.stringify(data));
    }

    function loadSavedData() {
      const saved = localStorage.getItem("snickerscupData");

      if (!saved) {
        return;
      }

      try {
        const data = JSON.parse(saved);

        if (data.format) {
          document.getElementById("formatSelect").value = data.format;
        }

        if (data.players) {
          document.getElementById("playerInput").value = data.players;
        }
      } catch (e) {
        console.log("Kunne ikke læse gemte data", e);
      }
    }

    function loadFromUrl() {
      if (!window.location.hash.startsWith("#data=")) {
        return;
      }

      try {
        const encoded = window.location.hash.replace("#data=", "");
        const json = decodeURIComponent(atob(encoded));
        const data = JSON.parse(json);

        if (data.format) {
          document.getElementById("formatSelect").value = data.format;
        }

        if (Array.isArray(data.players)) {
          document.getElementById("playerInput").value = data.players.join("\n");
        }

        showMessage("Spillerliste blev hentet fra delt link.", "success");
      } catch (e) {
        showMessage("Det delte link kunne ikke læses.", "warning");
      }
    }

    function handleExcelUpload(event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        const firstSheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[firstSheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let players = [];

        rows.forEach(row => {
          if (row && row[0]) {
            const name = String(row[0]).trim();

            if (
              name &&
              name.toLowerCase() !== "navn" &&
              name.toLowerCase() !== "spiller" &&
              name.toLowerCase() !== "spillernavn"
            ) {
              players.push(name);
            }
          }
        });

        document.getElementById("playerInput").value = players.join("\n");
        saveData();
        showMessage(players.length + " spillere blev indlæst fra Excel.", "success");
      };

      reader.readAsArrayBuffer(file);
    }

    function generatePlan() {
      const format = getSelectedFormat();
      let players = getPlayers();

      if (players.length === 0) {
        players = defaultPlayers.slice(0, format.playerCount);
        document.getElementById("playerInput").value = players.join("\n");
      }

      if (players.length < format.playerCount) {
        showMessage(
          "Du mangler spillere. Formatet kræver " + format.playerCount + 
          " spillere, men du har kun " + players.length + ".",
          "warning"
        );
        return;
      }

      if (players.length > format.playerCount) {
        players = players.slice(0, format.playerCount);
        showMessage(
          "Der er flere spillere end formatet bruger. Kun de første " + 
          format.playerCount + " spillere er brugt.",
          "warning"
        );
      } else {
        showMessage("Kampplanen er lavet.", "success");
      }

      saveData();

      const matches = generateMatches(players, format);
      renderSetup(players, format);
      renderSchedule(matches);
    }

    function generateMatches(players, format) {
      const playerCount = format.playerCount;
      const teamSize = format.teamSize;
      const teams = format.teams;
      const rounds = format.rounds;

      let matches = [];
      let id = 1;

      /*
        Statisk banefordeling:

        4x5:
        Bane 1 = Hold 1 mod Hold 2
        Bane 2 = Hold 3 mod Hold 4

        8x5:
        Bane 1 = Hold 1 mod Hold 2
        Bane 2 = Hold 3 mod Hold 4
        Bane 3 = Hold 5 mod Hold 6
        Bane 4 = Hold 7 mod Hold 8

        Holdnumrene bliver altså på samme bane.
        Spillerne roterer mellem holdene via shift.
      */

      const order = createRotationOrder(playerCount);

      for (let r = 1; r <= rounds; r++) {
        const shift = ((r - 1) * 3) % playerCount;
        const rotated = order.slice(shift).concat(order.slice(0, shift));

        let roundTeams = [];

        for (let t = 0; t < teams; t++) {
          const start = t * teamSize;
          const indexes = rotated.slice(start, start + teamSize);
          const teamPlayers = indexes.map(index => players[index]);
          roundTeams.push(teamPlayers);
        }

        format.lanePairs.forEach((pair, laneIndex) => {
          matches.push({
            id: id++,
            round: r,
            lane: laneIndex + 1,
            team1: pair[0] + 1,
            team2: pair[1] + 1,
            players1: roundTeams[pair[0]],
            players2: roundTeams[pair[1]]
          });
        });
      }

      return matches;
    }

    function createRotationOrder(playerCount) {
      if (playerCount === 40) {
        return [
          0, 11, 22, 33, 4, 15, 26, 37,
          8, 19, 30, 1, 12, 23, 34, 5,
          16, 27, 38, 9, 20, 31, 2, 13,
          24, 35, 6, 17, 28, 39, 10, 21,
          32, 3, 14, 25, 36, 7, 18, 29
        ];
      }

      if (playerCount === 20) {
        return [
          0, 6, 12, 18, 4,
          10, 16, 2, 8, 14,
          1, 7, 13, 19, 5,
          11, 17, 3, 9, 15
        ];
      }

      return Array.from({ length: playerCount }, (_, i) => i);
    }

    function renderSetup(players, format) {
      const setupInfo = document.getElementById("setupInfo");

      setupInfo.innerHTML = `
        <strong>Valgt format:</strong> ${format.teams} hold á ${format.teamSize} spillere<br>
        <strong>Antal spillere:</strong> ${players.length}<br>
        <strong>Antal runder:</strong> ${format.rounds}<br>
        <strong>Antal baner:</strong> ${format.lanePairs.length}
      `;
    }

    function renderSchedule(matches) {
      const schedule = document.getElementById("schedule");
      schedule.innerHTML = "";

      const rounds = [...new Set(matches.map(match => match.round))];

      rounds.forEach(round => {
        const roundMatches = matches.filter(match => match.round === round);

        const roundDiv = document.createElement("div");
        roundDiv.className = "round";

        let html = `<h2>Runde ${round}</h2><div class="matches">`;

        roundMatches.forEach(match => {
          html += `
            <div class="match">
              <div class="lane">Bane ${match.lane}</div>
              <div class="teams">
                <div class="team">
                  <div class="team-title">Hold ${match.team1}</div>
                  <ul>
                    ${match.players1.map(player => `<li>${escapeHtml(player)}</li>`).join("")}
                  </ul>
                </div>
                <div class="team">
                  <div class="team-title">Hold ${match.team2}</div>
                  <ul>
                    ${match.players2.map(player => `<li>${escapeHtml(player)}</li>`).join("")}
                  </ul>
                </div>
              </div>
            </div>
          `;
        });

        html += `</div>`;
        roundDiv.innerHTML = html;
        schedule.appendChild(roundDiv);
      });
    }

    function sharePlan() {
      const format = document.getElementById("formatSelect").value;
      const players = getPlayers();

      if (players.length === 0) {
        showMessage("Der er ingen spillere at dele endnu.", "warning");
        return;
      }

      const data = {
        format: format,
        players: players
      };

      const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
      latestShareLink = window.location.origin + window.location.pathname + "#data=" + encoded;

      showMessage("Delbart link er lavet. Tryk nu på Kopiér link.", "success");
    }

    function copyShareLink() {
      if (!latestShareLink) {
        sharePlan();
      }

      if (!latestShareLink) {
        return;
      }

      navigator.clipboard.writeText(latestShareLink)
        .then(() => {
          showMessage("Linket er kopieret.", "success");
        })
        .catch(() => {
          showMessage("Kunne ikke kopiere automatisk. Link: " + latestShareLink, "warning");
        });
    }

    function clearAll() {
      localStorage.removeItem("snickerscupData");
      document.getElementById("playerInput").value = "";
      document.getElementById("schedule").innerHTML = "";
      document.getElementById("setupInfo").innerHTML = "Vælg format og indtast/upload spillere.";
      document.getElementById("message").innerHTML = "";
      window.location.hash = "";
    }

    function showMessage(text, type) {
      const message = document.getElementById("message");
      message.innerHTML = `<div class="${type}">${text}</div>`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
