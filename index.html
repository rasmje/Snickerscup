<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snickers Cup Kampplangenerator</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #123c69, #1f7a8c);
      color: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 34px;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      background: #ffcc00;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ffd633;
      transform: scale(1.01);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .info {
      background: rgba(255,255,255,0.18);
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      line-height: 1.5;
    }

    .round {
      background: rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .round h2 {
      margin-top: 0;
      color: #ffcc00;
    }

    .matches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .match {
      background: #fff;
      color: #111;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.25);
    }

    .lane {
      font-weight: bold;
      color: #123c69;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .team {
      background: #f2f2f2;
      border-radius: 10px;
      padding: 10px;
    }

    .team-title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #1f7a8c;
    }

    ul {
      padding-left: 18px;
      margin: 0;
    }

    .warning {
      background: #ffdddd;
      color: #8a0000;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    .success {
      background: #ddffdd;
      color: #005c00;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      opacity: 0.9;
    }

    @media print {
      body {
        background: white;
        color: black;
      }

      .no-print {
        display: none;
      }

      .card, .round {
        background: white;
        color: black;
        box-shadow: none;
        border: 1px solid #ccc;
      }

      .match {
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Snickers Cup</h1>
    <div class="subtitle">Kampplangenerator med spillerrotation</div>

    <div class="card no-print">
      <label for="formatSelect">Vælg format</label>
      <select id="formatSelect">
        <option value="4x5">4 hold á 5 spillere</option>
        <option value="8x5">8 hold á 5 spillere</option>
      </select>

      <label for="excelFile">Upload spillerliste fra Excel</label>
